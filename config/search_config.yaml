# The bot joins every entry into ONE LinkedIn keyword search. Talita searches a
# single plain keyword (no quotes): social media.
positions:
  - social media

remote: true
hybrid: true
onsite: true

experience_level:
  internship: false
  entry: true
  associate: true
  mid_senior_level: false
  director: false
  executive: false

job_types:
  full_time: true
  contract: false
  part_time: false
  temporary: false
  volunteer: false
  internship: false
  other: false

date:
  all_time: false
  month: false
  week: true
  24_hours: false

# Talita applies everywhere (any US location) - no location filter.
locations: []

apply_once_at_company: false

company_blacklist: []

# Talita targets entry/associate marketing & comms roles. Filter out senior/
# manager tracks that need more experience than her resume shows.
# NOTE: matching is case-insensitive SUBSTRING, so "Marketing Manager" (not bare
# "Manager") is used to keep the wanted "Community Manager" roles.
title_blacklist:
  - Senior
  - Sr.
  - Director
  - Head of
  - VP
  - Vice President
  - Chief
  - Marketing Manager
  - Product Marketing
  - Performance Marketing
  - Demand Generation
  - Marketing Automation
  - PPC
  - Data Scientist
  - Data Analyst
  - UX Researcher
  # Off-target roles that surface only because the job description mentions
  # "social media" (sales / account / paid-media / ad-buying tracks).
  - Account Executive
  - Account Manager
  - Sales
  - Business Development
  - Paid Media
  - Media Buyer
  - Media Planner
  - Paid Search
  # Financial / insurance sales roles (e.g. Northwestern Mutual "Financial
  # Representative") that LinkedIn injects into unrelated / marketing searches.
  - Financial Representative
  - Financial Advisor
  - Financial Professional
  - Financial Consultant
  - Financial Services
  - Wealth Management
  - Insurance Agent
  # Adjacent-but-not-social-media tracks (Talita wants social-media-focused roles only).
  - Public Relations
  - Recruiter
  - Recruiting

location_blacklist: []
